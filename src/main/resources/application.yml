spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scanbite
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      INDENT_OUTPUT: true

server:
  port: 8080

security:
  jwt:
    secret: ChangeMeReplaceWithSecureSecretKey
    expiration-ms: 3600000

app:
  websocket:
    endpoint: /ws/orders
